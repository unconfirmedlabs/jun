# Track SUI balance changes on testnet
#
# Usage:
#   DATABASE_URL=postgres://... jun run examples/balance-indexer.yml

sources:
  live:
    grpc: fullnode.testnet.sui.io:443
  backfill:
    archive: https://checkpoints.testnet.sui.io
    from: 100000000

processors:
  balances:
    coinTypes:
      - "0x2::sui::SUI"

storage:
  postgres:
    url: $DATABASE_URL
