# Track SUI balance changes on testnet
#
# Usage:
#   DATABASE_URL=postgres://... jun pipeline run examples/balance-indexer.yml

sources:
  grpcUrl: fullnode.testnet.sui.io:443
  archiveUrl: https://checkpoints.testnet.sui.io
  startCheckpoint: 100000000

processors:
  balances:
    coinTypes:
      - "0x2::sui::SUI"

storage:
  postgres: $DATABASE_URL
