network: testnet
grpcUrl: slc1.rpc.testnet.sui.mirai.cloud:443
database: $DATABASE_URL
startCheckpoint: 316756645

# Runtime defaults (override with CLI flags)
mode: all
repairGaps: false

events:
  RecordPressed:
    type: "0x10ad578f5b202fd137546f2e7bc12c319dfef98871feeb429506c4b3d62bf702::pressing::RecordPressedEvent"
    # Fields auto-resolved from chain — no manual definition needed

# Track SUI balance changes
balances:
  coinTypes:
    - "0x2::sui::SUI"

# Pre-computed aggregations
views:
  daily_presses:
    sql: |
      SELECT date_trunc('day', sui_timestamp) AS day,
             release_id,
             count(*) AS presses
      FROM record_pressed
      GROUP BY 1, 2
    refresh: 60s
