# Index specific Move events to Postgres
#
# Use case: dApp analytics, contract activity monitoring, event-driven backends
#
# Tables created:
#   One table per event handler (handler key = table name, snake_cased)
#   Fields auto-resolved from chain — no manual BCS schema needed
#
# Replace the event type below with your contract's event type.
# Find it with: jun codegen 0xPKG::module::EventStruct
#
# Query events:
#   SELECT * FROM my_event ORDER BY sui_timestamp DESC LIMIT 20;

sources:
  grpcUrl: fullnode.mainnet.sui.io:443
  archiveUrl: https://checkpoints.mainnet.sui.io
  startCheckpoint: 260000000

processors:
  events:
    my_event:
      type: "0xPKG::module::EventStruct"

storage:
  postgres: $DATABASE_URL
