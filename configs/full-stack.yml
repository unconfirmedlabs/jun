# Full production pipeline — events + balances + SSE + NATS
#
# Use case: production deployment with real-time streaming to consumers
#
# Indexes events and balance changes to Postgres, streams to SSE clients
# and NATS subscribers simultaneously.
#
# SSE: curl -N http://localhost:8080/stream/events
# NATS: nats sub "jun.events.decoded.*"

sources:
  live:
    grpc: fullnode.testnet.sui.io:443
  backfill:
    archive: https://checkpoints.testnet.sui.io
    from: 316756645

processors:
  events:
    record_pressed:
      type: "0x10ad578f5b202fd137546f2e7bc12c319dfef98871feeb429506c4b3d62bf702::pressing::RecordPressedEvent"
  balances:
    coinTypes:
      - "0x2::sui::SUI"

storage:
  postgres:
    url: $DATABASE_URL

broadcast:
  sse:
    port: 8080
  nats:
    url: nats://localhost:4222
    prefix: jun
