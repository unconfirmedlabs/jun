# Full production pipeline — events + balances + SSE + NATS
#
# Use case: production deployment with real-time streaming to consumers
#
# Indexes events and balance changes to Postgres, streams to SSE clients
# and NATS subscribers simultaneously.
#
# Replace the event type below with your contract's event type.
#
# SSE: curl -N http://localhost:8080/stream/events
# NATS: nats sub "jun.events.decoded.*"

sources:
  grpcUrl: fullnode.mainnet.sui.io:443
  archiveUrl: https://checkpoints.mainnet.sui.io
  startCheckpoint: 260000000

processors:
  events:
    my_event:
      type: "0xPKG::module::EventStruct"
  balances:
    coinTypes:
      - "0x2::sui::SUI"

storage:
  postgres: $DATABASE_URL

broadcast:
  sse:
    port: 8080
  nats:
    url: nats://localhost:4222
    prefix: jun
