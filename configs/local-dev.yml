# Local development — SQLite storage, no external dependencies
#
# Use case: quick local exploration, prototyping, AI chat integration
#
# No Postgres needed. Data stored in a local SQLite file.
# Replace the event type below with your contract's event type.
#
# Query with: sqlite3 events.db "SELECT * FROM my_event LIMIT 10"

sources:
  grpcUrl: fullnode.testnet.sui.io:443

processors:
  events:
    my_event:
      type: "0xPKG::module::EventStruct"

storage:
  sqlite: ./events.db
